---
- name: Find duplicate users and their detailed permissions
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: true

  tasks:
    - name: Load all users
      ansible.builtin.set_fact:
        all_users: "{{ query('ansible.platform.gateway_api', 'users', return_all=True, return_objects=True, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) }}"

    - name: Group users by email
      ansible.builtin.set_fact:
        users_by_email: "{{ (users_by_email | default({})) | combine({ item.email: (users_by_email[item.email] | default([])) + [item] }) }}"
      loop: "{{ all_users }}"
      when: item.email is defined and item.email | length > 0
      loop_control:
        label: "{{ item.username }}"

    - name: Identify users with shared emails
      ansible.builtin.set_fact:
        dupe_users: "{{ dupe_users | default([]) + [item.1] }}"
      loop: "{{ users_by_email | dict2items | subelements('value') }}"
      when: (users_by_email[item.0.key] | length) > 1
      loop_control:
        label: "{{ item.1.username }}"

    - name: Collect Unique Role IDs
      ansible.builtin.set_fact:
        unique_role_ids: >-
          {% set role_ids = [] %}
          {% for u in dupe_users | default([]) %}
            {% set assignments = query('ansible.platform.gateway_api', 'role_user_assignments', query_params={'user_id': u.id}, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) %}
            {% for a in assignments %}
              {% set r_id = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
              {% if r_id not in role_ids %}{% set _ = role_ids.append(r_id) %}{% endif %}
            {% endfor %}
          {% endfor %}
          {{ role_ids }}

    - name: Fetch and Map Role Permissions
      ansible.builtin.set_fact:
        role_cache: "{{ role_cache | default({}) | combine({ item | string: query('ansible.platform.gateway_api', 'role_definitions/' + item | string, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs)[0].permissions }) }}"
      loop: "{{ unique_role_ids | from_yaml }}"
      loop_control:
        label: "Caching Permissions for Role ID: {{ item }}"
      when: unique_role_ids is defined and unique_role_ids != "[]"

    - name: Build User Permission Report
      ansible.builtin.set_fact:
        user_report: "{{ user_report | default([]) + [ {'user': item.username, 'email': item.email, 'all_permissions': final_perms | from_yaml | unique} ] }}"
      vars:
        assignments: "{{ query('ansible.platform.gateway_api', 'role_user_assignments', query_params={'user_id': item.id}, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) }}"
        final_perms: >-
          {% set p_list = [] %}
          {% for a in assignments %}
            {% set r_id = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
            {% set _ = p_list.extend(role_cache[r_id | string] | default([])) %}
          {% endfor %}
          {{ p_list }}
      loop: "{{ dupe_users | default([]) }}"
      loop_control:
        label: "Compiling report for {{ item.username }}"

    - name: Display Pretty Summary
      ansible.builtin.debug:
        msg: 
          - "------------------------------------------------"
          - "USER: {{ item.user }} ({{ item.email }})"
          - "PERMISSIONS: {{ item.all_permissions | join(', ') }}"
          - "------------------------------------------------"
      loop: "{{ user_report | default([]) }}"
      loop_control:
        label: "{{ item.user }}"

    # --- Merge duplicate accounts (single playbook: no loop-on-block, no include_tasks) ---
    # Plan is built in one set_fact (Jinja tracks role fingerprints per canonical across duplicates).
    # Apply: all role POSTs, then superuser, then deletes. Skip API changes: -e dupuser_merge_apply=false
    - name: Build merge plan (grants, superuser promotions, user deletions)
      ansible.builtin.set_fact:
        merge_plan: "{{ merge_plan_json | from_json }}"
      vars:
        merge_plan_json: >-
          {% set ns = namespace(grants=[], super_usernames=[], deletes=[]) %}
          {% set super_seen = namespace(names=[]) %}
          {% for email_entry in users_by_email | default({}) | dict2items %}
          {% if email_entry.value | length > 1 %}
          {% set sorted_u = email_entry.value | sort(attribute='id') %}
          {% set canonical = sorted_u | first %}
          {% set fps = namespace(list=[]) %}
          {% set cas = query('ansible.platform.gateway_api', 'role_user_assignments', query_params={'user_id': canonical.id}, return_all=True, return_objects=True, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) %}
          {% for a in cas %}
          {% set rd = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
          {% set _ = fps.list.append(rd | string ~ '|' ~ (a.object_id | default('', true) | string) ~ '|' ~ (a.object_ansible_id | default('', true) | string)) %}
          {% endfor %}
          {% for dup in sorted_u[1:] %}
          {% set das = query('ansible.platform.gateway_api', 'role_user_assignments', query_params={'user_id': dup.id}, return_all=True, return_objects=True, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) %}
          {% for a in das %}
          {% set rd = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
          {% set fp = rd | string ~ '|' ~ (a.object_id | default('', true) | string) ~ '|' ~ (a.object_ansible_id | default('', true) | string) %}
          {% if fp not in fps.list %}
          {% set _ = fps.list.append(fp) %}
          {% if a.object_id is defined and a.object_id is not none %}
          {% set _ = ns.grants.append({'role_definition': rd | int, 'user': canonical.id | int, 'object_id': a.object_id}) %}
          {% elif a.object_ansible_id is defined and a.object_ansible_id is not none and (a.object_ansible_id | string | length > 0) %}
          {% set _ = ns.grants.append({'role_definition': rd | int, 'user': canonical.id | int, 'object_ansible_id': a.object_ansible_id}) %}
          {% else %}
          {% set _ = ns.grants.append({'role_definition': rd | int, 'user': canonical.id | int}) %}
          {% endif %}
          {% endif %}
          {% endfor %}
          {% if dup.is_superuser | default(false) %}
          {% if canonical.username not in super_seen.names %}
          {% set _ = super_seen.names.append(canonical.username) %}
          {% set _ = ns.super_usernames.append(canonical.username) %}
          {% endif %}
          {% endif %}
          {% set _ = ns.deletes.append({'username': dup.username, 'email': dup.email}) %}
          {% endfor %}
          {% endif %}
          {% endfor %}
          {{ {'grants': ns.grants, 'super_usernames': ns.super_usernames, 'deletes': ns.deletes} | to_json }}

    - name: Gateway API base URL for role merge
      ansible.builtin.set_fact:
        gateway_api_base: "{{ aap_hostname | regex_replace('/$', '') }}"

    - name: Show merge plan only (dry run)
      ansible.builtin.debug:
        var: merge_plan
      when: not (dupuser_merge_apply | default(true) | bool)

    - name: POST role assignments onto original users
      ansible.builtin.uri:
        url: "{{ gateway_api_base }}/api/gateway/v1/role_user_assignments/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body: "{{ item }}"
        status_code: [200, 201]
      loop: "{{ merge_plan.grants | default([]) }}"
      loop_control:
        label: "role {{ item.role_definition }} -> user id {{ item.user }}"
      when:
        - dupuser_merge_apply | default(true) | bool
        - merge_plan.grants | default([]) | length > 0

    - name: Promote original user to superuser when any duplicate was superuser
      ansible.platform.user:
        username: "{{ item }}"
        is_superuser: true
        state: present
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ merge_plan.super_usernames | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when:
        - dupuser_merge_apply | default(true) | bool
        - merge_plan.super_usernames | default([]) | length > 0

    - name: Remove duplicate user accounts
      ansible.platform.user:
        username: "{{ item.username }}"
        email: "{{ item.email }}"
        state: absent
        aap_hostname: "{{ aap_hostname }}"
        aap_username: "{{ aap_username }}"
        aap_password: "{{ aap_password }}"
        aap_validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ merge_plan.deletes | default([]) }}"
      loop_control:
        label: "{{ item.username }}"
      when:
        - dupuser_merge_apply | default(true) | bool
        - merge_plan.deletes | default([]) | length > 0
