---
- name: Find duplicate users and their detailed permissions
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: true

  tasks:
    - name: Load all users
      ansible.builtin.set_fact:
        all_users: "{{ query('ansible.platform.gateway_api', 'users', return_all=True, return_objects=True, host=aap_hostname, username=aap_username, password=aap_password, verify_ssl=aap_validate_certs) }}"

    - name: Group users by email
      ansible.builtin.set_fact:
        users_by_email: "{{ (users_by_email | default({})) | combine({ item.email: (users_by_email[item.email] | default([])) + [item] }) }}"
      loop: "{{ all_users }}"
      when: item.email is defined and item.email | length > 0

    - name: Identify duplicate groups
      ansible.builtin.set_fact:
        dupe_groups: "{{ dupe_groups | default([]) + [ item.value ] }}"
      loop: "{{ users_by_email | dict2items }}"
      when: item.value | length > 1

    - name: Flatten duplicate users
      ansible.builtin.set_fact:
        dupe_users: "{{ dupe_groups | flatten(levels=1) }}"

    - name: Collect Unique Role IDs
      ansible.builtin.set_fact:
        unique_role_ids: >-
          {% set role_ids = [] %}
          {% for u in dupe_users | default([]) %}
            {% set assignments = query('ansible.platform.gateway_api', 'role_user_assignments',
              query_params={'user_id': u.id},
              host=aap_hostname, username=aap_username,
              password=aap_password, verify_ssl=aap_validate_certs) %}
            {% for a in assignments %}
              {% set r_id = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
              {% if r_id not in role_ids %}{% set _ = role_ids.append(r_id) %}{% endif %}
            {% endfor %}
          {% endfor %}
          {{ role_ids }}

    - name: Fetch and Map Role Permissions
      ansible.builtin.set_fact:
        role_cache: "{{ role_cache | default({}) | combine({
          item | string:
          query('ansible.platform.gateway_api', 'role_definitions/' + item | string,
          host=aap_hostname, username=aap_username,
          password=aap_password, verify_ssl=aap_validate_certs)[0].permissions
        }) }}"
      loop: "{{ unique_role_ids | from_yaml }}"
      when: unique_role_ids is defined and unique_role_ids != "[]"

    - name: Build User Permission Report
      ansible.builtin.set_fact:
        user_report: "{{ user_report | default([]) + [ {
          'user': item.username,
          'email': item.email,
          'all_permissions': final_perms | from_yaml | unique
        } ] }}"
      vars:
        assignments: "{{ query('ansible.platform.gateway_api', 'role_user_assignments',
          query_params={'user_id': item.id},
          host=aap_hostname, username=aap_username,
          password=aap_password, verify_ssl=aap_validate_certs) }}"
        final_perms: >-
          {% set p_list = [] %}
          {% for a in assignments %}
            {% set r_id = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
            {% set _ = p_list.extend(role_cache[r_id | string] | default([])) %}
          {% endfor %}
          {{ p_list }}
      loop: "{{ dupe_users | default([]) }}"

    - name: Display Pretty Summary
      ansible.builtin.debug:
        msg:
          - "------------------------------------------------"
          - "USER: {{ item.user }} ({{ item.email }})"
          - "PERMISSIONS: {{ item.all_permissions | join(', ') }}"
          - "------------------------------------------------"
      loop: "{{ user_report | default([]) }}"

    # =========================================================
    # MERGE + DELETE LOGIC (FIXED)
    # =========================================================

    - name: Build primary user map (first user = primary)
      ansible.builtin.set_fact:
        primary_map: "{{ primary_map | default({}) | combine({ item.key: item.value }) }}"
      loop: "{{ users_by_email | dict2items }}"
      when: item.value | length > 1

    # ---- GET PRIMARY USER ROLES (FIXED) ----

    - name: Merge roles - get primary roles (robust)
      ansible.builtin.set_fact:
        primary_roles_map: "{{ primary_roles_map | default({}) | combine({ item.key: role_ids }) }}"
      vars:
        assignments: "{{ query('ansible.platform.gateway_api', 'role_user_assignments',
          query_params={'user_id': item.value[0].id},
          host=aap_hostname, username=aap_username,
          password=aap_password, verify_ssl=aap_validate_certs) }}"
        role_ids: >-
          {% set ids = [] %}
          {% for a in assignments %}
            {% set rid = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
            {% if rid not in ids %}
              {% set _ = ids.append(rid) %}
            {% endif %}
          {% endfor %}
          {{ ids }}
      loop: "{{ primary_map | dict2items }}"

    # ---- MERGE ROLES ----

    - name: Merge roles from duplicates into primary user
      vars:
        duplicate_users: "{{ item.value[1:] }}"
      loop: "{{ primary_map | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      block:

        - name: Process each duplicate user
          vars:
            dup: "{{ dup_user }}"
            assignments: "{{ query('ansible.platform.gateway_api', 'role_user_assignments',
              query_params={'user_id': dup_user.id},
              host=aap_hostname, username=aap_username,
              password=aap_password, verify_ssl=aap_validate_certs) }}"
          loop: "{{ duplicate_users }}"
          loop_control:
            loop_var: dup_user
          block:

            - name: Assign missing roles to primary
              ansible.builtin.uri:
                url: "{{ aap_hostname }}/api/gateway/v1/role_user_assignments/"
                method: POST
                user: "{{ aap_username }}"
                password: "{{ aap_password }}"
                force_basic_auth: true
                validate_certs: "{{ aap_validate_certs }}"
                body_format: json
                body:
                  user: "{{ item.value[0].id }}"
                  role_definition: "{{ (role.role_definition.id if role.role_definition is mapping else role.role_definition) }}"
              loop: "{{ assignments }}"
              loop_control:
                loop_var: role
              when: >
                (role.role_definition.id if role.role_definition is mapping else role.role_definition)
                not in primary_roles_map[item.key]

    # ---- DELETE DUPLICATES ----

    - name: Delete duplicate users (excluding primary)
      vars:
        duplicate_users: "{{ item.value[1:] }}"
      loop: "{{ primary_map | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      block:

        - name: Remove duplicate users
          ansible.builtin.uri:
            url: "{{ aap_hostname }}/api/gateway/v1/users/{{ dup_user.id }}/"
            method: DELETE
            user: "{{ aap_username }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ aap_validate_certs }}"
            status_code: [204, 202]
          loop: "{{ duplicate_users }}"
          loop_control:
            loop_var: dup_user
