---
# Merge duplicate gateway users (same email): copy role assignments onto the canonical user
# (lowest numeric user id), optionally align superuser, then delete the duplicate account.
#
# Requires ansible.platform collection. Set CONTROLLER_HOST, CONTROLLER_USERNAME, CONTROLLER_PASSWORD
# (or gateway equivalents / module defaults).
#
# Extra vars:
#   dupuser_apply: true   # set false to only print planned merges (no API changes)
#
# include: dupuser2_merge_once.yml (per-duplicate steps)
#
- name: Merge duplicate users — roles onto canonical user, remove duplicate
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: true
    dupuser_apply: true

  module_defaults:
    group/ansible.platform.gateway:
      aap_hostname: "{{ aap_hostname }}"
      aap_username: "{{ aap_username }}"
      aap_password: "{{ aap_password }}"
      aap_validate_certs: "{{ aap_validate_certs }}"

  tasks:
    - name: Load all users
      ansible.builtin.set_fact:
        all_users: >-
          {{
            query(
              'ansible.platform.gateway_api',
              'users',
              return_all=True,
              return_objects=True,
              host=aap_hostname,
              username=aap_username,
              password=aap_password,
              verify_ssl=aap_validate_certs,
            )
          }}

    - name: Group users by email
      ansible.builtin.set_fact:
        users_by_email: "{{ (users_by_email | default({})) | combine({ item.email: (users_by_email[item.email] | default([])) + [item] }) }}"
      loop: "{{ all_users }}"
      when: item.email is defined and item.email | length > 0
      loop_control:
        label: "{{ item.username }}"

    - name: Build merge queue (canonical = lowest user id per shared email)
      ansible.builtin.set_fact:
        merge_queue: "{{ merge_queue | default([]) + [{'email': item.0.key, 'canonical': item.0.value | sort(attribute='id') | first, 'duplicate': item.1}] }}"
      loop: "{{ users_by_email | dict2items | subelements('value') }}"
      when: (item.0.value | length) > 1 and (item.1.id != ((item.0.value | sort(attribute='id') | first).id))
      loop_control:
        label: "{{ item.1.username }} -> {{ (item.0.value | sort(attribute='id') | first).username }}"

    - name: No duplicate emails
      ansible.builtin.debug:
        msg: "No duplicate email addresses found."
      when: merge_queue is not defined or merge_queue | length == 0

    - name: Gateway API base URL (no trailing slash)
      ansible.builtin.set_fact:
        gateway_api_base: "{{ aap_hostname | regex_replace('/$', '') }}"
      when: merge_queue is defined and merge_queue | length > 0

    - name: Apply merges (roles + remove duplicates)
      ansible.builtin.include_tasks:
        file: dupuser2_merge_once.yml
      loop: "{{ merge_queue }}"
      loop_control:
        loop_var: merge_entry
        label: "{{ merge_entry.duplicate.username }}"
      when:
        - dupuser_apply | bool
        - merge_queue is defined
        - merge_queue | length > 0

    - name: Dry run — show planned merges only
      ansible.builtin.debug:
        var: merge_queue
      when:
        - not (dupuser_apply | bool)
        - merge_queue is defined
        - merge_queue | length > 0

    - name: Summary
      ansible.builtin.debug:
        msg: "Queued {{ merge_queue | default([]) | length }} duplicate user(s); dupuser_apply={{ dupuser_apply }}."
      when: merge_queue is defined
