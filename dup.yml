---
- name: Find duplicate users, merge roles, delete duplicates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: true

  tasks:

    # -------------------------------------------------
    # 1. LOAD USERS
    # -------------------------------------------------
    - name: Load all users
      ansible.builtin.set_fact:
        all_users: >-
          {{ query('ansible.platform.gateway_api', 'users',
             return_all=True,
             return_objects=True,
             host=aap_hostname,
             username=aap_username,
             password=aap_password,
             verify_ssl=aap_validate_certs) }}

    # -------------------------------------------------
    # 2. GROUP USERS BY EMAIL
    # -------------------------------------------------
    - name: Group users by email
      ansible.builtin.set_fact:
        users_by_email: "{{ users_by_email | default({}) | combine({ item.email: (users_by_email[item.email] | default([])) + [item] }) }}"
      loop: "{{ all_users }}"
      when: item.email is defined and item.email | length > 0

    # -------------------------------------------------
    # 3. BUILD DUPLICATE GROUPS
    # -------------------------------------------------
    - name: Build duplicate groups
      ansible.builtin.set_fact:
        dupe_groups: "{{ dupe_groups | default([]) + [item.value] }}"
      loop: "{{ users_by_email | dict2items }}"
      when: item.value | length > 1

    - name: Ensure dupe_groups exists
      ansible.builtin.set_fact:
        dupe_groups: "{{ dupe_groups | default([]) }}"

    # -------------------------------------------------
    # 4. INIT FINAL MERGE JOB LIST
    # -------------------------------------------------
    - name: Initialize merge_jobs
      ansible.builtin.set_fact:
        merge_jobs: []

    # -------------------------------------------------
    # 5. SAFE BUILD (NO STRING CONVERSION POSSIBLE)
    # -------------------------------------------------
    - name: Build merge jobs safely
      ansible.builtin.set_fact:
        merge_jobs: "{{ merge_jobs + [item] }}"
      loop: >-
        {{
          lookup('ansible.builtin.pipe', 'echo ""')
        }}
      vars:
        safe_jobs: >-
          {% set jobs = [] %}

          {% for group in dupe_groups %}
            {% set primary = group[0] %}

            {% for dup in group[1:] %}
              {% set assignments = query('ansible.platform.gateway_api', 'role_user_assignments',
                query_params={'user_id': dup.id},
                host=aap_hostname,
                username=aap_username,
                password=aap_password,
                verify_ssl=aap_validate_certs) %}

              {% for a in assignments %}
                {% set rid = a.role_definition.id if a.role_definition is mapping else a.role_definition %}

                {% set _ = jobs.append({
                  "primary_id": primary.id,
                  "dup_id": dup.id,
                  "role_id": rid
                }) %}
              {% endfor %}
            {% endfor %}
          {% endfor %}

          {{ jobs }}
      run_once: true

    - name: Set merge_jobs properly (final safe conversion)
      ansible.builtin.set_fact:
        merge_jobs: "{{ safe_jobs | from_yaml }}"
      vars:
        safe_jobs: >-
          {% set jobs = [] %}

          {% for group in dupe_groups %}
            {% set primary = group[0] %}

            {% for dup in group[1:] %}
              {% set assignments = query('ansible.platform.gateway_api', 'role_user_assignments',
                query_params={'user_id': dup.id},
                host=aap_hostname,
                username=aap_username,
                password=aap_password,
                verify_ssl=aap_validate_certs) %}

              {% for a in assignments %}
                {% set rid = a.role_definition.id if a.role_definition is mapping else a.role_definition %}
                {% set _ = jobs.append({
                  "primary_id": primary.id,
                  "dup_id": dup.id,
                  "role_id": rid
                }) %}
              {% endfor %}
            {% endfor %}
          {% endfor %}

          {{ jobs | to_json }}

    # -------------------------------------------------
    # 6. ASSIGN ROLES (SAFE LOOP)
    # -------------------------------------------------
    - name: Assign roles to primary users
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/gateway/v1/role_user_assignments/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          user: "{{ item.primary_id }}"
          role_definition: "{{ item.role_id }}"
        status_code: [200, 201, 204]
      loop: "{{ merge_jobs | default([]) }}"

    # -------------------------------------------------
    # 7. DELETE DUPLICATES
    # -------------------------------------------------
    - name: Delete duplicate users
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/gateway/v1/users/{{ item }}/"
        method: DELETE
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        status_code: [202, 204]
      loop: >-
        {{
          merge_jobs
          | default([])
          | map(attribute='dup_id')
          | unique
          | list
        }}
